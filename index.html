<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Khalid Jewellers - Gold Converter</title>

<meta name="theme-color" content="#0d0d0d">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gold Converter">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="BB1D3160-126D-4CB5-8720-3C727001BBF1.png">

<link rel="icon" href="BB1D3160-126D-4CB5-8720-3C727001BBF1.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#0d0d0d,#1b1b1b);
color:#fff;
padding:20px;
max-width:520px;
margin:auto;
}

.header{
text-align:center;
margin:15px 0 25px;
}

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:24px;
overflow:hidden;
border:3px solid #D4AF37;
box-shadow:0 0 25px rgba(212,175,55,.45);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.brand{
margin-top:15px;
font-size:34px;
font-weight:bold;
color:#D4AF37;
}

.subtitle{
margin-top:8px;
font-size:18px;
color:#ddd;
}

.card{
background:#171717;
border:2px solid #D4AF37;
border-radius:20px;
padding:20px;
margin-top:25px;
}
.card h2{
text-align:center;
color:#D4AF37;
margin-bottom:18px;
font-size:22px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #D4AF37;
border-radius:12px;
background:#0f0f0f;
color:#fff;
font-size:18px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(180deg,#FFD700,#B8860B);
color:#111;
font-size:19px;
font-weight:bold;
cursor:pointer;
}

.out{
display:none;
margin-top:18px;
padding:15px;
border:1px solid #D4AF37;
border-radius:12px;
background:#0d0d0d;
color:#FFD700;
font-size:20px;
font-weight:bold;
text-align:center;
}

.footer{
text-align:center;
margin-top:35px;
color:#bbb;
font-size:15px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
<img src="BB1D3160-126D-4CB5-8720-3C727001BBF1.png">
</div>

<div class="brand">
Khalid Jewellers
</div>

<div class="subtitle">
Gold Weight Converter
</div>

</div>

<div class="card">

<h2>Tola / Masha / Ratti → Grams</h2>

<input id="t" type="number" placeholder="Enter Tola">

<input id="m" type="number" placeholder="Enter Masha">

<input id="r" type="number" placeholder="Enter Ratti">

<button onclick="tmr()">Convert</button>

<div id="a" class="out"></div>

</div>

<div class="card">

<h2>Grams → Tola / Masha / Ratti</h2>
<input id="g" type="number" placeholder="Enter Grams">

<button onclick="gt()">Convert</button>

<div id="b" class="out"></div>

</div>

<div class="footer">
Created by Zunair Khalid
</div>

<script>

const G = 11.664;

function v(id){
return parseFloat(document.getElementById(id).value)||0;
}

function tmr(){

let grams=(
v("t")+
(v("m")/12)+
(v("r")/96)
)*G;

let out=document.getElementById("a");

out.style.display="block";

out.innerHTML=
"Grams : <b>"+
grams.toFixed(3)+
"</b>";

}

function gt(){

let x=v("g")/G;

let t=Math.floor(x);

let m0=(x-t)*12;

let m=Math.floor(m0);

let r=(m0-m)*8;

let out=document.getElementById("b");

out.style.display="block";
out.innerHTML=
"<b>"+t+"</b> Tola<br><br>"+
"<b>"+m+"</b> Masha<br><br>"+
"<b>"+r.toFixed(3)+"</b> Ratti";

}

if("serviceWorker" in navigator){

window.addEventListener("load",function(){

navigator.serviceWorker.register("sw.js")
.then(function(){

console.log("Service Worker Registered");

})
.catch(function(error){

console.log(error);

});

});

}

</script>

</body>

</html>
